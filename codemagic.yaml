# codemagic.yaml
workflows:
  build-iris-metal:
    name: Build Iris Metal Mod
    instance_type: mac_mini_m2              # 必须 macOS（Metal 框架）
    environment:
      # 这里不再需要 groups，直接省略即可
    scripts:
      - name: Install JDK 25
        script: |
          brew install openjdk@25
          export JAVA_HOME=$(/usr/libexec/java_home -v 25)
          echo "JAVA_HOME=$JAVA_HOME" >> $CM_ENV
          java -version

      - name: Compile Swift Native Library
        script: |
          cd src/main/native
          # 如果构建机是 Intel，请将 -target 改为 x86_64-apple-macos14.0
          swiftc -O -target arm64-apple-macos14.0 \
            -framework Foundation -framework Metal -framework MetalKit \
            -framework QuartzCore \
            -emit-library IrisMetalNative.swift \
            -o ../resources/natives/macos/libiris_metal.dylib
          cd ../../..

      - name: Build Mod Jar with Gradle
        script: |
          chmod +x gradlew
          ./gradlew build --no-daemon

    artifacts:
      - build/libs/*.jar
