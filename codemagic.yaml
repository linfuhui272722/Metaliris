workflows:
  build-iris-metal:
    name: Build Iris Metal Mod
    instance_type: mac_mini_m2          # 若为 Intel，请改为 mac_mini

    scripts:
      - name: Install JDK 25 (Temurin)
        script: |
          cd $CM_BUILD_DIR
          curl -L -o jdk.tar.gz \
            https://github.com/adoptium/temurin25-binaries/releases/download/jdk-25%2B36/OpenJDK25U-jdk_aarch64_mac_hotspot_25_36.tar.gz
          sudo mkdir -p /Library/Java/JavaVirtualMachines
          sudo tar -xzf jdk.tar.gz -C /Library/Java/JavaVirtualMachines
          JDK_DIR=$(ls /Library/Java/JavaVirtualMachines | grep jdk-25 | head -1)
          export JAVA_HOME="/Library/Java/JavaVirtualMachines/$JDK_DIR/Contents/Home"
          echo "export JAVA_HOME=$JAVA_HOME" >> $CM_ENV
          $JAVA_HOME/bin/java -version

      - name: Compile Swift Native Library
        script: |
          cd $CM_BUILD_DIR
          cd src/main/native
          # 若为 Intel，将 -target 改为 x86_64-apple-macos14.0
          swiftc -O -target arm64-apple-macos14.0 \
            -framework Foundation -framework Metal -framework MetalKit \
            -framework QuartzCore \
            -emit-library IrisMetalNative.swift \
            -o ../resources/natives/macos/libiris_metal.dylib
          cd $CM_BUILD_DIR

      - name: Download metallum dependency
        script: |
          cd $CM_BUILD_DIR
          mkdir -p libs
          # 下载 metallum v0.0.21 的 jar 文件，文件名与 flatDir 解析规则匹配
          curl -L -o libs/metallum-0.0.21.jar \
            https://github.com/kokodio/metallum/releases/download/v0.0.21/metallum-0.0.21.jar

      - name: Build Mod Jar with Gradle
        script: |
          cd $CM_BUILD_DIR
          source $CM_ENV
          echo "Using JAVA_HOME: $JAVA_HOME"
          $JAVA_HOME/bin/java -version

          # 创建 init.gradle 配置 flatDir 和依赖替换
          cat > init.gradle << 'EOF'
          allprojects {
              repositories {
                  // 将本地 libs 目录设为最高优先级
                  flatDir { dirs 'libs' }
                  // 保留原有仓库（避免其他依赖缺失）
                  mavenCentral()
                  maven { url 'https://maven.fabricmc.net/' }
                  maven { url 'https://libraries.minecraft.net/' }
                  maven { url 'https://api.modrinth.com/maven' }
              }
              configurations.all {
                  resolutionStrategy {
                      dependencySubstitution {
                          // 将 modrinth 仓库的 metallum 替换为本地 flatDir 中的 metallum
                          substitute module('maven.modrinth:metallum:0.0.21')
                            using module('metallum:metallum:0.0.21')
                      }
                  }
              }
          }
          EOF

          # 安装 Gradle（若已安装则跳过）
          brew install gradle || true

          # 执行构建，应用 init.gradle
          gradle build --no-daemon -Dorg.gradle.java.home="$JAVA_HOME" -I init.gradle

    artifacts:
      - build/libs/*.jar
