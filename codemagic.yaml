workflows:
  build-iris-metal:
    name: Build Iris Metal Mod
    instance_type: mac_mini_m2

    scripts:
      - name: Install JDK 25 (Temurin)
        script: |
          cd $CM_BUILD_DIR
          curl -L -o jdk.tar.gz \
            https://github.com/adoptium/temurin25-binaries/releases/download/jdk-25%2B36/OpenJDK25U-jdk_aarch64_mac_hotspot_25_36.tar.gz
          sudo mkdir -p /Library/Java/JavaVirtualMachines
          sudo tar -xzf jdk.tar.gz -C /Library/Java/JavaVirtualMachines
          JDK_DIR=$(ls /Library/Java/JavaVirtualMachines | grep jdk-25 | head -1)
          export JAVA_HOME="/Library/Java/JavaVirtualMachines/$JDK_DIR/Contents/Home"
          echo "export JAVA_HOME=$JAVA_HOME" >> $CM_ENV
          $JAVA_HOME/bin/java -version

      - name: Compile Swift Native Library
        script: |
          cd $CM_BUILD_DIR
          cd src/main/native
          swiftc -O -target arm64-apple-macos14.0 \
            -framework Foundation -framework Metal -framework MetalKit \
            -framework QuartzCore \
            -emit-library IrisMetalNative.swift \
            -o ../resources/natives/macos/libiris_metal.dylib
          cd $CM_BUILD_DIR

      - name: Download dependencies (metallum, iris, sodium)
        script: |
          cd $CM_BUILD_DIR
          mkdir -p libs
          # 1. metallum
          curl -L -o libs/metallum-0.0.21.jar \
            https://github.com/kokodio/metallum/releases/download/v0.0.21/metallum-0.0.21.jar
          # 2. Iris (Fabric 26.2)[reference:0]
          curl -L -o libs/iris-fabric-1.11.1+mc26.2.jar \
            https://edge.forgecdn.net/files/6272/940/iris-fabric-1.11.1%2Bmc26.2.jar
          # 3. Sodium (Fabric 26.2)[reference:1][reference:2]
          curl -L -o libs/sodium-fabric-0.9.0+mc26.2.jar \
            https://edge.forgecdn.net/files/6260/965/sodium-fabric-0.9.0%2Bmc26.2.jar

      - name: Fix build configuration and build
        script: |
          cd $CM_BUILD_DIR
          source $CM_ENV
          echo "Using JAVA_HOME: $JAVA_HOME"
          $JAVA_HOME/bin/java -version

          # 创建合法的 access widener
          mkdir -p src/main/resources
          echo "accessWidener v2 official" > src/main/resources/iris_metal.accesswidener

          # 修改 build.gradle：替换 metallum 依赖为本地 jar
          sed -i.bak "s/modImplementation 'maven.modrinth:metallum:0.0.21'/modImplementation files('libs\/metallum-0.0.21.jar')/" build.gradle

          # 在 dependencies 块中插入 Iris 和 Sodium 的本地依赖
          sed -i.bak "/dependencies {/a\
              modImplementation files('libs/iris-fabric-1.11.1+mc26.2.jar')\n\
              modImplementation files('libs/sodium-fabric-0.9.0+mc26.2.jar')
          " build.gradle

          # 创建 init.gradle，配置本地仓库和必要远程仓库
          cat > init.gradle << 'EOF'
          allprojects {
              repositories {
                  flatDir { dirs 'libs' }
                  mavenCentral()
                  maven { url 'https://maven.fabricmc.net/' }
                  maven { url 'https://libraries.minecraft.net/' }
                  maven { url 'https://api.modrinth.com/maven' }
              }
          }
          EOF

          brew install gradle || true
          gradle build --no-daemon -Dorg.gradle.java.home="$JAVA_HOME" -I init.gradle

    artifacts:
      - build/libs/*.jar
